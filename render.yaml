# Render blueprint — web service + cron jobs for Affilaite.
services:
  - type: web
    name: affilaite
    runtime: node
    plan: starter
    branch: claude/ui-polish-styling-mtwadu
    autoDeploy: true
    buildCommand: npm install && npm run build
    preDeployCommand: npm run db:migrate
    startCommand: npm run start
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: AUTH_SECRET
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SHOPIFY_STORE_DOMAIN
        sync: false
      - key: SHOPIFY_ADMIN_TOKEN
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SHOPIFY_API_VERSION
        value: "2025-07"
      - key: PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_CLIENT_SECRET
        sync: false
      - key: PAYPAL_BASE
        value: https://api-m.sandbox.paypal.com
      # Verifies inbound PayPal/Venmo payout webhooks (PayPal → Webhooks → ID).
      - key: PAYPAL_WEBHOOK_ID
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      # SMS for signup phone verification (optional — blank keeps demo mode).
      - key: SMS_PROVIDER
        sync: false
      - key: SMS_API_KEY
        sync: false
      - key: SMS_API_SECRET
        sync: false
      - key: SMS_FROM
        sync: false
      - key: APP_URL
        sync: false
      - key: CRON_SECRET
        sync: false

  # Daily: mature commissions past their hold window (pending -> approved).
  - type: cron
    name: affilaite-approve-commissions
    runtime: node
    branch: claude/ui-polish-styling-mtwadu
    autoDeploy: true
    schedule: "0 6 * * *"
    buildCommand: npm install
    startCommand: >-
      node -e "fetch(process.env.APP_URL + '/api/cron', { headers: { Authorization: 'Bearer ' + process.env.CRON_SECRET } }).then(r=>r.text()).then(console.log)"
    envVars:
      - key: APP_URL
        sync: false
      - key: CRON_SECRET
        sync: false
